

<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{
font-family: Arial;
background:url("bg 6.jpg") no-repeat;
background-size: cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
width:300px;
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:linear-gradient(45deg,#6a5acd,#ff4da6);
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:NAVY;
transform:scale(1.08);
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="password" id="adminPass" placeholder="Enter Password">

<br>

<button onclick="checkPass()">Login</button>

</div>

<script>

function checkPass(){

var pass=document.getElementById("adminPass").value;

if(pass==="alfaaz"){

alert("Welcome Admin");

window.location.href="ADMIN.html";

}else{

alert("Wrong Password");

}

}

</script>

</body>

</html>
